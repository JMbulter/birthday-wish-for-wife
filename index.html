<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老婆生日快乐 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            font-family: "微软雅黑", sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }
        /* 标题 */
        .title {
            color: white;
            font-size: 32px;
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 10px rgba(255, 0, 100, 0.5);
        }
        /* 照片墙 */
        .photo-wall {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }
        .photo-item {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 祝福文字 */
        .wish {
            color: white;
            font-size: 20px;
            text-align: center;
            line-height: 1.8;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 68, 136, 0.2);
            border-radius: 15px;
        }
        /* 爱心按钮 */
        .heart-btn {
            font-size: 60px;
            color: #ff3366;
            text-align: center;
            animation: beat 1.2s infinite;
            margin: 20px 0;
            cursor: pointer;
        }
        /* 页面2 */
        .page2 {
            display: none;
            text-align: center;
        }
        .back-btn {
            padding: 10px 25px;
            background: #ff3366;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        /* 音乐按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #ff3366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }
        /* 爱心飘落 */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart-fall {
            position: absolute;
            color: #ff3366;
            font-size: 18px;
            animation: fall linear infinite;
            opacity: 0;
        }
        /* 烟花容器 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        /* 动画 */
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(8); opacity: 0.8; }
            100% { transform: scale(15); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 音乐控制 -->
    <div class="music-control" id="musicBtn">🎵</div>
    <audio id="bgm" loop>
        <source src="https://raw.githubusercontent.com/JMbulter/birthday-wish-for-wife/main/birthday.mp3" type="audio/mpeg">
    </audio>

    <!-- 烟花容器 -->
    <div id="fireworks"></div>

    <!-- 爱心飘落容器 -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- 页面1 -->
    <div class="page1" id="page1">
        <h1 class="title">亲爱的老婆，生日快乐！🎂</h1>
        <div class="wish">
            愿你永远被爱包围，永远开心，永远漂亮～<br>
            我会一直宠着你，陪着你，爱你一辈子 ❤️
        </div>

        <!-- 照片墙 -->
        <div class="photo-wall">
            <div class="photo-item"><img src="https://raw.githubusercontent.com/JMbulter/birthday-wish-for-wife/main/222.jpg" alt="合照1"></div>
            <div class="photo-item"><img src="https://raw.githubusercontent.com/JMbulter/birthday-wish-for-wife/main/666.jpg" alt="合照2"></div>
            <div class="photo-item"><img src="https://raw.githubusercontent.com/JMbulter/birthday-wish-for-wife/main/888.jpg" alt="合照3"></div>
        </div>

        <div class="heart-btn" onclick="goPage2()">❤️</div>
    </div>

    <!-- 页面2 -->
    <div class="page2" id="page2">
        <h1 class="title">💖 给你的专属惊喜 💖</h1>
        <div class="wish">
            生日快乐我的女孩！<br>
            岁岁常欢愉，年年皆胜意<br>
            我的世界因为有你才完整～
        </div>
        <button class="back-btn" onclick="goPage1()">返回祝福页</button>
    </div>

    <script>
        // 页面跳转
        function goPage2() {
            document.getElementById("page1").style.display = "none";
            document.getElementById("page2").style.display = "block";
            fireworks(); // 触发烟花
        }
        function goPage1() {
            document.getElementById("page2").style.display = "none";
            document.getElementById("page1").style.display = "block";
        }

        // 音乐控制
        const musicBtn = document.getElementById("musicBtn");
        const bgm = document.getElementById("bgm");
        let isMusicPlay = false;

        musicBtn.onclick = function() {
            if (isMusicPlay) {
                bgm.pause();
                musicBtn.textContent = "🎵";
            } else {
                bgm.play().catch(() => {
                    alert("请先点击页面任意位置，再播放音乐～");
                });
                musicBtn.textContent = "🔊";
            }
            isMusicPlay = !isMusicPlay;
        };

        // 点击页面解锁音乐（浏览器限制）
        document.addEventListener("click", () => {
            if (!isMusicPlay) bgm.play().catch(() => {});
        }, { once: true });

        // 爱心飘落
        setInterval(() => {
            const heart = document.createElement("div");
            heart.className = "heart-fall";
            heart.textContent = "❤️";
            heart.style.left = Math.random() * 100 + "%";
            heart.style.animationDuration = 5 + Math.random() * 8 + "s";
            document.getElementById("heartsContainer").appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }, 300);

        // 烟花特效
        function fireworks() {
            const box = document.getElementById("fireworks");
            for (let i = 0; i < 20; i++) {
                const firework = document.createElement("div");
                firework.style.cssText = `
                    position: absolute;
                    width: 6px;
                    height: 6px;
                    border-radius: 50%;
                    background: ${["#ff0000", "#ff9900", "#ffff00", "#00ff00", "#0099ff"][Math.floor(Math.random()*5)]};
                    left: ${Math.random()*100}%;
                    top: ${Math.random()*100}%;
                    animation: firework 1.5s ease-out forwards;
                `;
                box.appendChild(firework);
                setTimeout(() => firework.remove(), 1500);
            }
        }
    </script>
</body>
</html>
