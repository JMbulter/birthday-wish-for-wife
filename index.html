<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老婆生日快乐 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            font-family: "微软雅黑", sans-serif;
            padding: 20px;
            overflow-x: hidden;
            transform: translateZ(0); /* 硬件加速 */
        }
        .title {
            color: white;
            font-size: 24px;
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 10px rgba(255, 0, 100, 0.5);
        }
        .photo-wall {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }
        .photo-item {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .wish {
            color: white;
            font-size: 16px;
            text-align: center;
            line-height: 1.8;
            padding: 15px;
            background: rgba(255, 68, 136, 0.2);
            border-radius: 15px;
            margin: 20px 0;
        }
        .heart-btn {
            font-size: 50px;
            color: #ff3366;
            text-align: center;
            animation: beat 1.2s infinite;
            cursor: pointer;
            margin: 30px 0;
            transform: translateZ(0);
        }
        .page2 {
            display: none;
            text-align: center;
        }
        .back-btn {
            padding: 10px 25px;
            background: #ff3366;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #ff3366;
            color: white;
            display: grid;
            place-items: center;
            cursor: pointer;
            z-index: 99;
            transform: translateZ(0);
        }
        .hearts-container, #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .heart-fall {
            position: absolute;
            color: #ff3366;
            font-size: 16px;
            animation: fall linear forwards;
            opacity: 0;
            transform: translateZ(0);
        }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        @keyframes fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(8); opacity: 0.8; }
            100% { transform: scale(15); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicBtn">🎵</div>
    <!-- 音频标签（对应你仓库里的 birthday.mp3） -->
    <audio id="bgm" loop>
        <source src="birthday.mp3" type="audio/mpeg">
    

    <!-- 特效容器 -->
    <div id="fireworks"></div>
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- 页面1 -->
    <div class="page1" id="page1">
        <h1 class="title">亲爱的老婆，生日快乐！🎂</h1>
        <div class="wish">
            愿你永远被爱包围，永远开心，永远漂亮～<br>
            我会一直宠着你，陪着你，爱你一辈子 ❤️
        </div>
        <div class="photo-wall">
            <!-- 对应你仓库里的三张图片 -->
            <div class="photo-item"><img src="222.jpg" alt="合照1"></div>
            <div class="photo-item"><img src="666.jpg" alt="合照2"></div>
            <div class="photo-item"><img src="888.jpg" alt="合照3"></div>
        </div>
        <div class="heart-btn" onclick="goPage2()">❤️</div>
    </div>

    <!-- 页面2 -->
    <div class="page2" id="page2">
        <h1 class="title">💖 给你的专属惊喜 💖</h1>
        <div class="wish">
            生日快乐我的女孩！<br>
            岁岁常欢愉，年年皆胜意<br>
            我的世界因为有你才完整～
        </div>
        <button class="back-btn" onclick="goPage1()">返回祝福页</button>
    </div>

    <script>
        // 1. 页面切换逻辑
        const page1 = document.getElementById("page1");
        const page2 = document.getElementById("page2");
        function goPage2() {
            page1.style.display = "none";
            page2.style.display = "block";
            fireworks(); // 切换页面触发烟花
        }
        function goPage1() {
            page2.style.display = "none";
            page1.style.display = "block";
        }

        // 2. 音乐播放控制（适配 GitHub Pages 浏览器策略）
        const musicBtn = document.getElementById("musicBtn");
        const bgm = document.getElementById("bgm");
        let isMusicPlay = false;

        // 页面点击解锁音频（首次点击后才能播放）
        document.body.addEventListener('click', () => {
            if (!isMusicPlay) bgm.load();
        }, { once: true });

        musicBtn.onclick = () => {
            if (isMusicPlay) {
                bgm.pause();
                musicBtn.textContent = "🎵";
            } else {
                bgm.play().catch(() => {
                    alert("请先点击页面任意位置，再播放音乐～");
                });
                musicBtn.textContent = "🔊";
            }
            isMusicPlay = !isMusicPlay;
        };

        // 3. 爱心飘落（GitHub 性能优化版：限制数量+低频创建）
        const heartsContainer = document.getElementById("heartsContainer");
        let heartCount = 0;
        const MAX_HEART = 25; // 最大爱心数量，避免卡顿
        const createHeart = () => {
            if (heartCount >= MAX_HEART) return;
            const h = document.createElement("div");
            h.className = "heart-fall";
            h.textContent = "❤️";
            h.style.left = Math.random() * 100 + "%";
            const duration = 4 + Math.random() * 4; // 动画时长
            h.style.animationDuration = `${duration}s`;
            heartsContainer.appendChild(h);
            heartCount++;
            // 动画结束后删除元素，释放内存
            setTimeout(() => {
                h.remove();
                heartCount--;
            }, duration * 1000);
        };
        // 600ms 创建一个爱心，降低频率减少 DOM 开销
        setInterval(createHeart, 600);

        // 4. 烟花特效（防抖，避免重复触发）
        let isFiring = false;
        function fireworks() {
            if (isFiring) return;
            isFiring = true;
            const box = document.getElementById("fireworks");
            // 减少烟花数量，适配 GitHub 服务器性能
            for (let i = 0; i < 15; i++) {
                const f = document.createElement("div");
                f.style.cssText = `
                    position:absolute;
                    width:6px;height:6px;
                    border-radius:50%;
                    background:${["#ff0000","#ff9900","#ffff00","#00ff00","#0099ff"][Math.floor(Math.random()*5)]};
                    left:${Math.random()*100}%;
                    top:${Math.random()*100}%;
                    animation:firework 1.5s forwards;
                `;
                box.appendChild(f);
                setTimeout(() => f.remove(), 1500);
            }
            // 1.6s 后解锁，避免重复点击创建大量烟花
            setTimeout(() => isFiring = false, 1600);
        }
    </script>
</body>
</html>
