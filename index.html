<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>给老婆的专属生日祝福 ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            font-family: "微软雅黑", "苹方", sans-serif;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }
        /* 标题动画 */
        .title {
            color: white;
            font-size: clamp(28px, 5vw, 40px);
            text-align: center;
            margin: 30px 0;
            text-shadow: 2px 2px 10px rgba(255, 0, 100, 0.5);
            animation: fadeIn 2s ease;
            position: relative;
            z-index: 10;
        }
        /* 倒计时样式 */
        .countdown {
            color: #ff3366;
            font-size: clamp(18px, 3vw, 24px);
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* 照片墙 */
        .photo-wall {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
            padding: 0 10px;
            position: relative;
            z-index: 10;
        }
        .photo-item {
            width: clamp(150px, 30vw, 200px);
            height: clamp(150px, 30vw, 200px);
            border-radius: 10px;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .photo-item:hover {
            transform: scale(1.05);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }
        .photo-item:hover img {
            filter: brightness(1.1);
        }
        /* 照片预览弹窗 */
        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .photo-modal img {
            max-width: 90%;
            max-height: 90%;
            border: 5px solid white;
            border-radius: 10px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 祝福文字 */
        .wish {
            color: white;
            font-size: clamp(20px, 4vw, 28px);
            text-align: center;
            line-height: 1.8;
            margin: 40px 0;
            padding: 0 20px;
            animation: float 3s ease-in-out infinite;
            background: rgba(255, 68, 136, 0.2);
            padding: 20px;
            border-radius: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
        /* 爱心跳动 */
        .heart {
            text-align: center;
            font-size: clamp(60px, 10vw, 80px);
            color: #ff3366;
            animation: beat 1.2s infinite;
            margin: 20px 0;
            position: relative;
            z-index: 10;
        }
        /* 署名 */
        .signature {
            color: white;
            font-size: clamp(18px, 3vw, 22px);
            text-align: center;
            margin-top: 50px;
            font-style: italic;
            position: relative;
            z-index: 10;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }
        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ff3366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .music-control:hover {
            transform: scale(1.1);
        }
        /* 烟花容器 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        /* 爱心飘落动画容器 */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .heart-fall {
            position: absolute;
            color: #ff3366;
            font-size: 20px;
            animation: fall linear infinite;
            opacity: 0;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* 动画定义 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(8); opacity: 0.8; }
            100% { transform: scale(15); opacity: 0; }
        }
        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ff9a9e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-heart {
            font-size: 60px;
            color: white;
            animation: beat 1s infinite;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .photo-wall {
                gap: 10px;
            }
            .wish {
                padding: 15px;
                margin: 20px 0;
                line-height: 1.6;
            }
            .music-control {
                width: 40px;
                height: 40px;
            }
            .title {
                margin: 20px 0;
            }
            .signature {
                margin-top: 30px;
            }
        }
        
        /* 横屏提示 */
        @media (orientation: landscape) and (max-height: 500px) {
            .landscape-tip {
                display: block !important;
            }
        }
        .landscape-tip {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 154, 158, 0.95);
            color: white;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loader" id="loader">
        <div class="loader-heart">❤️</div>
    </div>

    <!-- 横屏提示 -->
    <div class="landscape-tip" id="landscapeTip">
        📱 请竖屏浏览获得更好体验哦～<br>
        旋转你的手机，感受满满的爱意 💖
    </div>

    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicBtn">🎵</div>
    
    <!-- 音频元素 -->
    <audio id="birthdayMusic" loop preload="auto">
        <source src="birthday.mp3" type="audio/mpeg">
        <source src="birthday.ogg" type="audio/ogg">
    </audio>
    
    <!-- 烟花容器 -->
    <div id="fireworks"></div>
    
    <!-- 爱心飘落容器 -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- 照片预览弹窗 -->
    <div class="photo-modal" id="photoModal">
        <div class="close-modal" id="closeModal">✕</div>
        <img src="" alt="照片预览" id="modalImage">
    </div>

    <h1 class="title">生日快乐！🥳</h1>
    
    <!-- 生日倒计时 -->
    <div class="countdown" id="countdown"></div>

    <!-- 照片墙 -->
    <div class="photo-wall">
        <div class="photo-item" data-src="666.jpg"><img src="666.jpg" alt="照1"></div>
        <div class="photo-item" data-src="222.jpg"><img src="222.jpg" alt="照2"></div>
        <div class="photo-item" data-src="888.jpg"><img src="888.jpg" alt="美照"></div>
    </div>

    <!-- 专属祝福 -->
    <div class="wish">
        愿我的女孩永远闪闪发光✨<br>
        不用做完美的大人，只做我最疼的小朋友<br>
        新的一岁，平安喜乐，万事胜意，有我陪你～<br>
        往后余生，风雪是你，平淡是你，清贫是你，荣华是你<br>
        目光所至，皆是你 ❤️
    </div>

    <div class="heart">❤️</div>

    <div class="signature"> 💌</div>

    <script>
        // 核心配置项 - 可根据需要修改
        const CONFIG = {
            birthday: new Date(2000, 2, 19), // 老婆生日（月从0开始，2=3月）
            wifeName: "甄鑫鑫", // 老婆名字
            husbandName: "老公", // 老公名字
            musicSrc: "birthday.mp3", // 背景音乐路径
            fireworkOnBirthday: true, // 生日当天是否放烟花
            heartFallCount: 50, // 飘落爱心数量
            heartFallInterval: 300, // 爱心生成间隔(ms)
            photoItems: [ // 照片列表
                { src: "1.jpg", alt: "我们的合照1" },
                { src: "2.jpg", alt: "我们的合照2" },
                { src: "3.jpg", alt: "老婆的美照" }
            ],
            wishText: `愿我的女孩永远闪闪发光✨<br>
不用做完美的大人，只做我最疼的小朋友<br>
新的一岁，平安喜乐，万事胜意，有我陪你～<br>
往后余生，风雪是你，平淡是你，清贫是你，荣华是你<br>
目光所至，皆是你 ❤️` // 祝福文字
        };

        // DOM元素
        const elements = {
            loader: document.getElementById('loader'),
            countdown: document.getElementById('countdown'),
            musicBtn: document.getElementById('musicBtn'),
            audio: document.getElementById('birthdayMusic'),
            heartsContainer: document.getElementById('heartsContainer'),
            fireworks: document.getElementById('fireworks'),
            photoModal: document.getElementById('photoModal'),
            modalImage: document.getElementById('modalImage'),
            closeModal: document.getElementById('closeModal'),
            wish: document.querySelector('.wish'),
            signature: document.querySelector('.signature')
        };

        // 状态管理
        const state = {
            isMusicPlaying: false,
            isPageLoaded: false,
            hasInteracted: false
        };

        // 1. 页面加载完成处理
        function handlePageLoad() {
            // 隐藏加载动画
            setTimeout(() => {
                elements.loader.style.opacity = 0;
                setTimeout(() => {
                    elements.loader.style.display = 'none';
                }, 500);
            }, 800);
            
            // 初始化内容
            elements.wish.innerHTML = CONFIG.wishText;
            elements.signature.textContent = `爱你的${CONFIG.husbandName} 💌`;
            
            state.isPageLoaded = true;
        }

        // 2. 倒计时功能
        function updateCountdown() {
            if (!state.isPageLoaded) return;
            
            const now = new Date();
            let nextBirthday = new Date(now.getFullYear(), CONFIG.birthday.getMonth(), CONFIG.birthday.getDate());
            
            // 如果今年生日过了，算明年的
            if (now > nextBirthday) {
                nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
            }

            // 计算时间差
            const diffTime = nextBirthday - now;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const diffMinutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            const diffSeconds = Math.floor((diffTime % (1000 * 60)) / 1000);

            // 更新显示
            if (diffDays === 0 && diffHours === 0 && diffMinutes === 0 && diffSeconds === 0) {
                elements.countdown.textContent = `🎉 今天是${CONFIG.wifeName}的生日！生日快乐！🎂`;
                // 生日当天触发烟花
                if (CONFIG.fireworkOnBirthday) {
                    startFireworks();
                }
            } else if (diffDays === 0) {
                elements.countdown.textContent = `⏰ 距离${CONFIG.wifeName}的生日还有 ${diffHours}小时${diffMinutes}分${diffSeconds}秒～`;
            } else {
                elements.countdown.textContent = `🎀 距离${CONFIG.wifeName}的生日还有 ${diffDays} 天${diffHours}小时～`;
            }
        }

        // 3. 背景音乐控制
        function initMusic() {
            elements.audio.src = CONFIG.musicSrc;
            
            // 音乐按钮点击事件
            elements.musicBtn.addEventListener('click', () => {
                toggleMusic();
            });

            // 页面交互后尝试播放音乐（解决自动播放限制）
            document.addEventListener('click', () => {
                if (!state.hasInteracted) {
                    state.hasInteracted = true;
                    elements.audio.play().catch(err => {
                        console.log("自动播放失败，需要用户手动点击播放:", err);
                    });
                }
            }, { once: true });
        }

        // 切换音乐播放状态
        function toggleMusic() {
            if (state.isMusicPlaying) {
                elements.audio.pause();
                elements.musicBtn.textContent = "🎵";
            } else {
                elements.audio.play().then(() => {
                    elements.musicBtn.textContent = "🔊";
                }).catch(err => {
                    console.log("播放需要用户交互:", err);
                    alert("请点击页面任意位置后再点击音乐按钮播放哦～");
                });
            }
            state.isMusicPlaying = !state.isMusicPlaying;
        }

        // 4. 爱心飘落动画
        function createHeartFall() {
            const heart = document.createElement('div');
            heart.className = 'heart-fall';
            heart.textContent = '❤️';
            
            // 随机位置、大小和动画时长
            const left = Math.random() * 100;
            const duration = 5 + Math.random() * 10;
            const size = 16 + Math.random() * 8;

            heart.style.left = `${left}%`;
            heart.style.fontSize = `${size}px`;
            heart.style.animationDuration = `${duration}s`;
            
            elements.heartsContainer.appendChild(heart);
            
            // 动画结束后移除
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // 5. 烟花特效
        function startFireworks() {
            const colors = ['#ff0000', '#ff9900', '#ffff00', '#00ff00', '#0099ff', '#9900ff', '#ff69b4'];
            
            function createFirework() {
                const firework = document.createElement('div');
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = Math.random() * 10 + 5;
                
                firework.style.position = 'absolute';
                firework.style.left = `${x}%`;
                firework.style.top = `${y}%`;
                firework.style.width = `${size}px`;
                firework.style.height = `${size}px`;
                firework.style.borderRadius = '50%';
                firework.style.background = color;
                firework.style.animation = `firework 1s ease-out forwards`;
                
                elements.fireworks.appendChild(firework);
                
                setTimeout(() => {
                    firework.remove();
                }, 1000);
            }
            
            // 连续放烟花
            let fireworkCount = 0;
            const fireworkInterval = setInterval(() => {
                // 每次生成多个烟花
                for(let i=0; i<3; i++) {
                    createFirework();
                }
                fireworkCount++;
                if (fireworkCount > 50) {
                    clearInterval(fireworkInterval);
                }
            }, 150);
        }

        // 6. 照片预览功能
        function initPhotoPreview() {
            const photoItems = document.querySelectorAll('.photo-item');
            
            photoItems.forEach(item => {
                item.addEventListener('click', () => {
                    const src = item.getAttribute('data-src');
                    const alt = item.querySelector('img').alt;
                    elements.modalImage.src = src;
                    elements.modalImage.alt = alt;
                    elements.photoModal.style.display = 'flex';
                });
            });
            
            // 关闭弹窗
            elements.closeModal.addEventListener('click', () => {
                elements.photoModal.style.display = 'none';
            });
            
            // 点击空白处关闭
            elements.photoModal.addEventListener('click', (e) => {
                if (e.target === elements.photoModal) {
                    elements.photoModal.style.display = 'none';
                }
            });
            
            // 键盘ESC关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && elements.photoModal.style.display === 'flex') {
                    elements.photoModal.style.display = 'none';
                }
            });
        }

        // 7. 初始化所有功能
        function init() {
            // 页面加载完成
            window.addEventListener('load', handlePageLoad);
            
            // 初始化音乐
            initMusic();
            
            // 初始化照片预览
            initPhotoPreview();
            
            // 倒计时初始化
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            // 爱心飘落循环
            setInterval(createHeartFall, CONFIG.heartFallInterval);
            
            // 错误处理
            window.addEventListener('error', (e) => {
                console.error("页面错误:", e);
            });
        }

        // 启动初始化
        init();
    </script>
</body>
</html>
